name: Docs PDF

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-docs-pdf.txt

      - name: Install PDF Docs Dependencies
        run: pip install -r requirements-docs-pdf.txt

      - name: Build PDF Docs
        env:
          ENABLE_PDF_EXPORT: "1"
        run: mkdocs build -f mkdocs-pdf.yml --strict

      - name: Upload Site Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf-site
          path: site
          retention-days: 7
