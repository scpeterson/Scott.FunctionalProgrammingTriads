name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MSBUILDDISABLENODEREUSE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docs Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
              - 'mkdocs.yml'
              - 'mkdocs-pdf.yml'
              - 'requirements-docs.txt'
              - 'requirements-docs-pdf.txt'
              - 'lychee.toml'
              - '.markdownlint.json'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json

      - name: Setup Python
        if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Restore
        run: dotnet restore Scott.FizzBuzz.sln

      - name: Build
        run: dotnet build Scott.FizzBuzz.sln --configuration Release --no-restore -m:1

      - name: Install Docs Dependencies
        if: steps.changes.outputs.docs == 'true'
        run: pip install -r requirements-docs.txt

      - name: Build Docs (Strict)
        if: steps.changes.outputs.docs == 'true'
        run: mkdocs build --strict

      - name: Markdown Lint
        if: steps.changes.outputs.docs == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint.json
          globs: |
            docs/**/*.md

      - name: Link Check (Offline/Internal)
        if: steps.changes.outputs.docs == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml docs
          fail: true

      - name: Test Core With Coverage Thresholds
        run: >
          dotnet test Scott.FizzBuzz.Core.Tests/Scott.FizzBuzz.Core.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FizzBuzz.Core]*
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:Threshold=60

      - name: Test Core Branch Coverage Threshold
        run: >
          dotnet test Scott.FizzBuzz.Core.Tests/Scott.FizzBuzz.Core.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FizzBuzz.Core]*
          /p:ThresholdType=branch
          /p:ThresholdStat=total
          /p:Threshold=50

      - name: Test Console Line Coverage Threshold
        run: >
          dotnet test Scott.FizzBuzz.Console.Tests/Scott.FizzBuzz.Console.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FizzBuzz.Console]*
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:Threshold=75

      - name: Test Console Branch Coverage Threshold
        run: >
          dotnet test Scott.FizzBuzz.Console.Tests/Scott.FizzBuzz.Console.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[Scott.FizzBuzz.Console]*
          /p:ThresholdType=branch
          /p:ThresholdStat=total
          /p:Threshold=80
